<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Exercise 2</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, Arial, sans-serif;
        background-color: #f9fafb;
        line-height: 1.6;
        max-width: 760px;
        margin: 0 auto;
        padding: 0 1.25rem;
      }

      h1,
      h2,
      h3 {
        line-height: 1.25;
        margin-top: 1.75rem;
        margin-bottom: 0.75rem;
      }

      h1 {
        font-size: 2rem;
        border-bottom: 1px solid #e5e7eb;
        padding-bottom: 0.5rem;
      }

      p {
        margin: 0.75rem 0;
      }

      hr {
        border: 0;
        border-top: 1px solid #e5e7eb;
        margin: 1.5rem 0;
      }

      ul,
      ol {
        padding-left: 1.5rem;
      }
      li {
        margin: 0.25rem 0;
      }
    </style>
  </head>

  <body>
    <h1>My Favorite Things</h1>

    <h2>Favorite Foods</h2>
    <ol>
      <li>
        <strong>Pizza</strong>
        <ul>
          <li>Margherita</li>
          <li>Pepperoni</li>
          <li>Hawaiian</li>
        </ul>
      </li>

      <li>
        <strong>Ice Cream</strong>
        <ul>
          <li>Chocolate Chip</li>
          <li>Vanilla</li>
        </ul>
      </li>

      <li><strong>Pasta</strong></li>

      <li><strong>Sushi</strong></li>
    </ol>

    <h2>Favorite Hobbies</h2>
    <ul>
      <li><strong>Reading</strong> - Personal development</li>

      <li>
        <strong>Gaming</strong>
        <ul>
          <li>Strategy games</li>
          <li>Puzzle games</li>
        </ul>
      </li>
    </ul>
  </body>
</html>
