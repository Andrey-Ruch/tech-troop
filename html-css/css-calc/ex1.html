<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Exercise 1</title>

    <style>
      h1 {
        text-align: center;
        font-weight: normal;
        margin-bottom: 30px;
      }

      .container {
        display: flex;
        width: 100%;
        height: 80px;
      }

      .left {
        width: calc(100% - 20px);
        background-color: lightpink;
      }

      .right {
        width: 20px;
        background-color: indianred;
      }
    </style>
  </head>

  <body>
    <h1>ex 1</h1>
    <div class="container">
      <div class="left"></div>
      <div class="right"></div>
    </div>
  </body>
</html>
